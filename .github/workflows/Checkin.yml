name: HIFITI-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # UTC
    - cron: "0 16 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      # TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      # TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js latest.
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Checkin
        id: checkin
        shell: bash
        run: |
          node main.js

      - name: PushPlus 通知
        if: ${{ always() && env.PUSHPLUS_TOKEN }}
        shell: bash
        run: |
          curl -s -X POST https://www.pushplus.plus/send \
            -d "token=${PUSHPLUS_TOKEN}" \
            -d "title=HIFINI 自动签到结果" \
            -d "content=${{ steps.checkin.outputs.result }}" \
            -d "template=markdown"

#      - name: Notify
